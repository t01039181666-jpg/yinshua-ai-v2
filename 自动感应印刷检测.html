<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>印刷自动检测</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');
  :root {
    --bg:#080c10; --card:#141c28; --border:#1e2d42;
    --ok:#00e676; --fail:#ff1744; --blue:#29b6f6;
    --text:#e8f0fe; --muted:#607d9a;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);height:100dvh;overflow:hidden;display:flex;flex-direction:column}

  /* SETUP */
  #phase-setup{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:28px 24px;gap:18px}
  .logo{font-size:11px;font-weight:700;letter-spacing:3px;color:var(--muted);text-transform:uppercase}
  h1{font-size:28px;font-weight:900;text-align:center;line-height:1.2}
  h1 span{color:var(--blue)}
  .desc{font-size:13px;color:var(--muted);text-align:center;line-height:1.7}
  .upload-box{width:100%;max-width:340px;border:2px dashed var(--border);border-radius:20px;padding:28px 20px;text-align:center;cursor:pointer;position:relative;background:var(--card);transition:all .2s}
  .upload-box.has-img{border-style:solid;border-color:var(--ok);padding:0;overflow:hidden}
  .upload-box img{width:100%;height:160px;object-fit:cover;border-radius:18px;display:block}
  .upload-box input{position:absolute;inset:0;opacity:0;width:100%;height:100%;cursor:pointer}
  .upload-icon{font-size:34px;margin-bottom:8px}
  .upload-label{font-size:15px;font-weight:700}
  .upload-hint{font-size:12px;color:var(--muted);margin-top:6px}
  .badge-ok{position:absolute;bottom:10px;right:10px;background:var(--ok);color:#000;font-size:10px;font-weight:900;padding:3px 10px;border-radius:20px}
  .sens-wrap{width:100%;max-width:340px}
  .sens-label{font-size:12px;color:var(--muted);margin-bottom:8px;text-align:center}
  .sens-row{display:flex;gap:8px}
  .sens-btn{flex:1;padding:10px 0;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s}
  .sens-btn.active{background:var(--blue);border-color:var(--blue);color:#000}
  .btn-start{width:100%;max-width:340px;padding:18px;background:var(--blue);border:none;border-radius:16px;color:#000;font-family:inherit;font-size:17px;font-weight:900;cursor:pointer;box-shadow:0 6px 24px rgba(41,182,246,.3);transition:all .15s}
  .btn-start:disabled{opacity:.3;cursor:not-allowed;box-shadow:none}

  /* SCAN */
  #phase-scan{display:none;flex-direction:column;height:100%;position:relative}
  #video{width:100%;flex:1;object-fit:cover;display:block;background:#000}
  .topbar{position:absolute;top:0;left:0;right:0;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(to bottom,rgba(8,12,16,.92),transparent);z-index:20}
  .topbar-left{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700}
  .live-dot{width:8px;height:8px;border-radius:50%;background:var(--ok);animation:pulse 1.2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
  .btn-exit{background:rgba(255,255,255,.1);border:none;border-radius:8px;color:var(--text);font-family:inherit;font-size:12px;font-weight:700;padding:7px 14px;cursor:pointer}

  /* Motion bar */
  .motion-bar{position:absolute;top:62px;left:16px;right:16px;z-index:20}
  .motion-label{font-size:10px;color:var(--muted);margin-bottom:4px}
  .motion-track{height:5px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden}
  .motion-fill{height:100%;width:0%;border-radius:3px;background:var(--blue);transition:width .1s,background .1s}

  /* Scan frame */
  .scan-frame{position:absolute;top:50%;left:50%;transform:translate(-50%,-62%);width:72vw;height:72vw;max-width:290px;max-height:290px;z-index:15;pointer-events:none}
  .fc{position:absolute;width:26px;height:26px;border-color:rgba(255,255,255,.8);border-style:solid}
  .fc-tl{top:0;left:0;border-width:3px 0 0 3px;border-radius:5px 0 0 0}
  .fc-tr{top:0;right:0;border-width:3px 3px 0 0;border-radius:0 5px 0 0}
  .fc-bl{bottom:0;left:0;border-width:0 0 3px 3px;border-radius:0 0 0 5px}
  .fc-br{bottom:0;right:0;border-width:0 3px 3px 0;border-radius:0 0 5px 0}
  .scan-line{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(41,182,246,.8),transparent);animation:scanline 1.8s linear infinite}
  @keyframes scanline{0%{top:0;opacity:1}100%{top:100%;opacity:.2}}

  /* Bottom */
  .bottom{position:absolute;bottom:0;left:0;right:0;padding:14px 20px 28px;background:linear-gradient(to top,rgba(8,12,16,.97) 70%,transparent);z-index:20;text-align:center}
  .status-chip{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.07);border-radius:20px;padding:6px 14px;font-size:12px;color:var(--muted);margin-bottom:10px}
  .verdict{font-size:54px;font-weight:900;line-height:1;margin-bottom:4px;min-height:60px;transition:color .2s}
  .verdict.waiting{font-size:18px;color:var(--muted);font-weight:400;padding-top:18px}
  .verdict.ok{color:var(--ok)}
  .verdict.fail{color:var(--fail);animation:flashfail .35s ease-in-out 4}
  @keyframes flashfail{0%,100%{opacity:1}50%{opacity:.2}}
  .verdict-sub{font-size:13px;color:var(--muted);margin-bottom:14px;min-height:18px}
  .stats{display:flex;justify-content:center;gap:12px;margin-bottom:12px}
  .stat{background:rgba(255,255,255,.06);border-radius:12px;padding:10px 20px;min-width:75px}
  .stat-val{font-size:22px;font-weight:900}
  .stat-val.green{color:var(--ok)}
  .stat-val.red{color:var(--fail)}
  .stat-label{font-size:10px;color:var(--muted);margin-top:2px}
  .btn-pause{background:rgba(255,255,255,.08);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:inherit;font-size:13px;font-weight:700;padding:10px 28px;cursor:pointer}
  .btn-pause.paused{border-color:var(--blue);color:var(--blue)}

  /* Alert flash */
  #alert-overlay{position:fixed;inset:0;z-index:100;background:rgba(255,23,68,.2);pointer-events:none;opacity:0;transition:opacity .08s}
  #alert-overlay.show{opacity:1}

  canvas{display:none}
</style>
</head>
<body>

<div id="phase-setup">
  <div class="logo">🔬 印刷自动检测系统</div>
  <h1>自动感应<br><span>无需按键</span></h1>
  <p class="desc">产品对准框框自动检测<br>不合格自动报警 · 全程不用动手</p>

  <div class="upload-box" id="upload-box">
    <input type="file" accept="image/*" id="std-input">
    <div class="upload-icon">📦</div>
    <div class="upload-label">选择标准合格样板图</div>
    <div class="upload-hint">从相册选一张合格品照片</div>
  </div>

  <div class="sens-wrap">
    <div class="sens-label">检测灵敏度</div>
    <div class="sens-row">
      <button class="sens-btn" data-v="15">宽松</button>
      <button class="sens-btn active" data-v="28">中等</button>
      <button class="sens-btn" data-v="42">严格</button>
    </div>
  </div>

  <button class="btn-start" id="btn-start" disabled>📷 开始自动检测</button>
</div>

<div id="phase-scan">
  <div class="topbar">
    <div class="topbar-left"><div class="live-dot"></div>自动检测中</div>
    <button class="btn-exit" id="btn-exit">✕ 退出</button>
  </div>

  <div class="motion-bar">
    <div class="motion-label">感应强度</div>
    <div class="motion-track"><div class="motion-fill" id="motion-fill"></div></div>
  </div>

  <video id="video" autoplay playsinline muted></video>

  <div class="scan-frame">
    <div class="fc fc-tl"></div><div class="fc fc-tr"></div>
    <div class="fc fc-bl"></div><div class="fc fc-br"></div>
    <div class="scan-line"></div>
  </div>

  <div class="bottom">
    <div class="status-chip" id="status-chip">⏳ 等待产品经过…</div>
    <div class="verdict waiting" id="verdict">将产品对准上方框框</div>
    <div class="verdict-sub" id="verdict-sub">感应到产品自动开始检测</div>
    <div class="stats">
      <div class="stat"><div class="stat-val green" id="count-ok">0</div><div class="stat-label">✅ 合格</div></div>
      <div class="stat"><div class="stat-val red" id="count-fail">0</div><div class="stat-label">❌ 不合格</div></div>
      <div class="stat"><div class="stat-val" id="count-total">0</div><div class="stat-label">📦 总计</div></div>
    </div>
    <button class="btn-pause" id="btn-pause">⏸ 暂停</button>
  </div>
</div>

<div id="alert-overlay"></div>
<canvas id="cap-canvas"></canvas>
<canvas id="std-canvas"></canvas>
<canvas id="prev-canvas"></canvas>

<script>
const W = 160, H = 160;
let stdData = null, sensitivity = 28;
let countOk = 0, countFail = 0;
let stream = null, paused = false, detecting = false;
let prevData = null, cooldown = false, frameCount = 0;
let motionHistory = [];

const video      = document.getElementById('video');
const stdInput   = document.getElementById('std-input');
const uploadBox  = document.getElementById('upload-box');
const btnStart   = document.getElementById('btn-start');
const btnExit    = document.getElementById('btn-exit');
const btnPause   = document.getElementById('btn-pause');
const verdictEl  = document.getElementById('verdict');
const verdictSub = document.getElementById('verdict-sub');
const statusChip = document.getElementById('status-chip');
const motionFill = document.getElementById('motion-fill');
const alertOvl   = document.getElementById('alert-overlay');
const capCanvas  = document.getElementById('cap-canvas');
const stdCanvas  = document.getElementById('std-canvas');
const prevCanvas = document.getElementById('prev-canvas');
const capCtx = capCanvas.getContext('2d');
const stdCtx = stdCanvas.getContext('2d');
const prevCtx = prevCanvas.getContext('2d');

// Audio
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
document.addEventListener('click', () => { if(audioCtx.state==='suspended') audioCtx.resume(); }, {once:true});

function beepOk() {
  try {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.frequency.value = 880; o.type = 'sine';
    g.gain.setValueAtTime(0.25, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.18);
    o.start(); o.stop(audioCtx.currentTime + 0.18);
  } catch(e){}
}

function beepFail() {
  try {
    [0, 0.2, 0.4].forEach(d => {
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.frequency.value = 280; o.type = 'square';
      g.gain.setValueAtTime(0.3, audioCtx.currentTime + d);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + d + 0.15);
      o.start(audioCtx.currentTime + d);
      o.stop(audioCtx.currentTime + d + 0.15);
    });
  } catch(e){}
}

// Load standard image
stdInput.addEventListener('change', e => {
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      stdCanvas.width = W; stdCanvas.height = H;
      stdCtx.drawImage(img, 0, 0, W, H);
      stdData = stdCtx.getImageData(0, 0, W, H).data;
      uploadBox.innerHTML = `<img src="${ev.target.result}"><div class="badge-ok">✓ 已选好</div>`;
      uploadBox.classList.add('has-img');
      btnStart.disabled = false;
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

// Sensitivity
document.querySelectorAll('.sens-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sens-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    sensitivity = parseInt(btn.dataset.v);
  });
});

// Start
btnStart.addEventListener('click', async () => {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode:'environment', width:{ideal:1280}, height:{ideal:720} }
    });
    video.srcObject = stream;
    await new Promise(r => { video.onloadedmetadata = r; });
    capCanvas.width = prevCanvas.width = W;
    capCanvas.height = prevCanvas.height = H;
    document.getElementById('phase-setup').style.display = 'none';
    document.getElementById('phase-scan').style.display = 'flex';
    detecting = true;
    requestAnimationFrame(loop);
  } catch(err) {
    alert('无法打开摄像头，请允许相机权限后重试。\n' + err.message);
  }
});

// Exit
btnExit.addEventListener('click', () => {
  detecting = false;
  if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; }
  document.getElementById('phase-scan').style.display = 'none';
  document.getElementById('phase-setup').style.display = 'flex';
  countOk=0; countFail=0; prevData=null; motionHistory=[];
  updateStats();
  setWaiting();
});

// Pause
btnPause.addEventListener('click', () => {
  paused = !paused;
  btnPause.textContent = paused ? '▶ 继续' : '⏸ 暂停';
  btnPause.classList.toggle('paused', paused);
  statusChip.textContent = paused ? '⏸ 已暂停' : '⏳ 等待产品经过…';
  if(paused) setWaiting();
});

function setWaiting() {
  verdictEl.className = 'verdict waiting';
  verdictEl.textContent = '将产品对准上方框框';
  verdictSub.textContent = '感应到产品自动开始检测';
}

function updateStats() {
  document.getElementById('count-ok').textContent = countOk;
  document.getElementById('count-fail').textContent = countFail;
  document.getElementById('count-total').textContent = countOk + countFail;
}

// ── Main loop ──
function loop() {
  if(!detecting) return;
  requestAnimationFrame(loop);
  if(paused || video.readyState < 2) return;

  frameCount++;
  // Run every 4 frames (~15fps on 60fps screen)
  if(frameCount % 4 !== 0) return;

  // Capture center square
  const vw = video.videoWidth, vh = video.videoHeight;
  const size = Math.min(vw, vh);
  const sx = (vw - size) / 2, sy = (vh - size) / 2;
  capCtx.drawImage(video, sx, sy, size, size, 0, 0, W, H);
  const curData = capCtx.getImageData(0, 0, W, H).data;

  if(!prevData) {
    prevData = new Uint8ClampedArray(curData);
    return;
  }

  // ── Motion detection: compare with previous frame ──
  let motionPx = 0;
  const total = W * H;
  const MOTION_THRESH = 18;

  for(let i = 0; i < total; i++) {
    const r = Math.abs(curData[i*4]   - prevData[i*4]);
    const g = Math.abs(curData[i*4+1] - prevData[i*4+1]);
    const b = Math.abs(curData[i*4+2] - prevData[i*4+2]);
    if((r+g+b)/3 > MOTION_THRESH) motionPx++;
  }

  const motionPct = motionPx / total * 100;

  // Smooth motion history (last 5 readings)
  motionHistory.push(motionPct);
  if(motionHistory.length > 5) motionHistory.shift();
  const avgMotion = motionHistory.reduce((a,b)=>a+b,0) / motionHistory.length;

  // Update motion bar
  const barW = Math.min(avgMotion * 4, 100);
  motionFill.style.width = barW + '%';
  motionFill.style.background = avgMotion > 5 ? '#ffd600' : 'var(--blue)';

  // Save current as previous
  prevData = new Uint8ClampedArray(curData);

  // ── Trigger detection when motion stops (product settled) ──
  // Product arriving = high motion, product settled = motion drops
  if(!cooldown) {
    // If motion is LOW = product is still in frame → detect
    if(avgMotion < 3 && motionHistory.length === 5) {
      // Make sure there's actually something in the frame (not empty)
      // by checking brightness variance
      let brightnessSum = 0;
      for(let i = 0; i < total; i++) {
        brightnessSum += (curData[i*4] + curData[i*4+1] + curData[i*4+2]) / 3;
      }
      const avgBrightness = brightnessSum / total;

      // Only detect if frame isn't mostly empty/dark
      if(avgBrightness > 30) {
        runDetection(curData);
      }
    }
  }
}

function runDetection(curData) {
  if(!stdData) return;
  cooldown = true;
  statusChip.textContent = '🔍 检测中…';

  // Compare with standard
  let diffPx = 0;
  const total = W * H;

  for(let i = 0; i < total; i++) {
    const r = Math.abs(stdData[i*4]   - curData[i*4]);
    const g = Math.abs(stdData[i*4+1] - curData[i*4+1]);
    const b = Math.abs(stdData[i*4+2] - curData[i*4+2]);
    if((r+g+b)/3 > sensitivity) diffPx++;
  }

  const diffPct = diffPx / total * 100;
  const isOK = diffPct < 10;

  if(isOK) {
    verdictEl.className = 'verdict ok';
    verdictEl.textContent = '✅ 合格';
    verdictSub.textContent = `差异 ${diffPct.toFixed(1)}% — 印刷正常`;
    statusChip.textContent = '✅ 合格';
    countOk++;
    beepOk();
  } else {
    verdictEl.className = 'verdict fail';
    verdictEl.textContent = '❌ 不合格';
    verdictSub.textContent = `差异 ${diffPct.toFixed(1)}% — 请挑出此产品！`;
    statusChip.textContent = '⛔ 发现不良！';
    countFail++;
    beepFail();
    // Red flash
    alertOvl.classList.add('show');
    setTimeout(() => alertOvl.classList.remove('show'), 600);
  }

  updateStats();

  // Cooldown 2.5s before next detection
  setTimeout(() => {
    cooldown = false;
    motionHistory = [];
    prevData = null;
    statusChip.textContent = '⏳ 等待下一个产品…';
    setTimeout(() => {
      if(!cooldown) setWaiting();
    }, 2000);
  }, 2500);
}
</script>
</body>
</html>
